<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#111820" />
    <title>GymOS Leden</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #0b1117;
        color: #f4f7fb;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
      }

      body {
        display: grid;
        place-items: center;
        padding: max(24px, env(safe-area-inset-top))
          max(20px, env(safe-area-inset-right))
          max(24px, env(safe-area-inset-bottom))
          max(20px, env(safe-area-inset-left));
        background:
          radial-gradient(circle at 50% 0%, rgba(65, 132, 255, 0.2), transparent 38%),
          #0b1117;
      }

      main {
        width: min(100%, 420px);
        display: grid;
        gap: 18px;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 12vw, 3.5rem);
        line-height: 0.95;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: #aab4c2;
        font-size: 1rem;
        line-height: 1.6;
      }

      a {
        width: fit-content;
        min-height: 48px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        padding: 0 20px;
        background: #4f9fff;
        color: #07111f;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>GymOS Leden</h1>
      <p>
        Open je lessen, reserveringen, betalingen en ledenservice in de
        GymOS ledenapp.
      </p>
      <a href="https://gym-platform-vc9yk.ondigitalocean.app/reserve">
        Open ledenapp
      </a>
    </main>
  </body>
</html>
